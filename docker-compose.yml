version: '3.8'

services:
  acme-envio-pedidos:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - acme-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/acme-envio-pedidos/api/pedidos/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  acme-network:
    driver: bridge
